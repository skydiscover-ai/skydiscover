# ARC mini benchmark: color-swap task
# Usage: skydiscover-run initial_program.py evaluator/ -c config.yaml
language: python
max_iterations: 100
checkpoint_interval: 10
max_solution_length: 20000
llm:
  api_base: https://api.openai.com/v1
  models:
    - name: "gpt-4o-mini"
      weight: 1.0
  max_tokens: 8192
  timeout: 120
prompt:
  system_message: |
    You are an expert at solving ARC (Abstraction and Reasoning Corpus) tasks.
    Your goal is to discover the transformation rule that maps input grids to
    output grids, then implement it as a Python function.

    The task involves small integer grids (values 0-9). You must implement:
        def solve(grid: list[list[int]]) -> list[list[int]]: ...

    Tips:
    - Look for simple per-cell transformations (color swaps, replacements)
    - The rule is consistent across all examples
    - Prefer simple, explicit logic over complex pattern matching

evaluator:
  timeout: 30

monitor:
  enabled: true
  port: 8765
  host: "127.0.0.1"
